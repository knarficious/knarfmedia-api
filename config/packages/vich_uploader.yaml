vich_uploader:
    db_driver: orm
    twig: false
    form: false
    storage: flysystem
    metadata:
        type: attribute
    mappings:
        uploads:
            uri_prefix: 'https://%env(AWS_S3_BUCKET)%.s3.%env(AWS_S3_REGION)%.amazonaws.com/uploads'
            upload_destination: s3.storage
            # Will rename uploaded files using a uniqueid as a prefix.
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
    use_flysystem_to_resolve_uri: true
